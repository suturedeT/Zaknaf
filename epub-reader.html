<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉpubLu — Lecteur ePub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --void: #080608;
  --deep: #100e12;
  --surface: #18151c;
  --lift: #221e28;
  --border: rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --ink: #d4cfe0;
  --ink-dim: #7a7385;
  --ink-faint: #3d3845;
  --accent: #c084fc;
  --accent2: #a855f7;
  --accent-glow: rgba(192,132,252,0.15);
  --green: #86efac;
  --green-dim: rgba(134,239,172,0.15);
  --red: #fca5a5;
  --red-dim: rgba(252,165,165,0.1);
  --reader-bg: #12101a;
  --reader-ink: #cfc8dc;
  --reader-font-size: 17px;
  --reader-line-height: 1.85;
  --sidebar-width: 280px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--void);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* grain */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ── Landing (dropzone) ── */
#landing {
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; padding:0 24px 80px;
}

.landing-header {
  padding:52px 0 40px;
  border-bottom:1px solid var(--border);
  margin-bottom:40px;
  width:100%; max-width:640px;
  display:flex; align-items:center; gap:14px;
}

.logo-icon {
  width:42px; height:42px;
  background:linear-gradient(135deg, var(--accent), #7c3aed);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  box-shadow:0 0 28px rgba(168,85,247,0.35);
}

.logo-text {
  font-family:'DM Serif Display', serif;
  font-size:26px; color:#fff;
  letter-spacing:-0.02em;
}
.logo-text span { color: var(--accent); }

.tagline { font-size:13px; color:var(--ink-dim); letter-spacing:0.03em; margin-top:4px; }

#dropzone {
  width:100%; max-width:640px;
  border:1px dashed rgba(192,132,252,0.3);
  border-radius:16px; padding:64px 24px;
  text-align:center; cursor:pointer;
  transition:all 0.25s;
  background:rgba(192,132,252,0.02);
  position:relative; overflow:hidden;
}

#dropzone::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 70% 70% at 50% 50%, rgba(192,132,252,0.06), transparent);
  opacity:0; transition:opacity 0.25s;
}

#dropzone:hover::before, #dropzone.over::before { opacity:1; }
#dropzone:hover, #dropzone.over { border-color:rgba(192,132,252,0.6); }

.dz-icon { font-size:48px; margin-bottom:14px; display:block; }
.dz-title { font-family:'DM Serif Display',serif; font-size:22px; color:#fff; margin-bottom:6px; }
.dz-sub { font-size:13px; color:var(--ink-dim); }
#fileInput { display:none; }

/* ── Library grid ── */
#library {
  display:none;
  width:100%; max-width:640px;
  margin-top:28px;
}

.library-title {
  font-size:12px; color:var(--ink-dim); letter-spacing:0.06em;
  text-transform:uppercase; margin-bottom:14px;
}

.book-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:16px;
}

.book-thumb {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; overflow:hidden; cursor:pointer;
  transition:all 0.2s;
  display:flex; flex-direction:column;
}

.book-thumb:hover { border-color:var(--border-hi); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }

.book-thumb-cover {
  width:100%; aspect-ratio:2/3;
  background:linear-gradient(135deg,var(--accent),#7c3aed);
  display:flex; align-items:center; justify-content:center;
  font-size:40px; overflow:hidden;
}

.book-thumb-cover img { width:100%; height:100%; object-fit:cover; }

.book-thumb-info {
  padding:10px 12px; flex:1;
  display:flex; flex-direction:column; gap:3px;
}

.book-thumb-title {
  font-family:'DM Serif Display',serif;
  font-size:13px; color:#fff;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

.book-thumb-author { font-size:11px; color:var(--ink-dim); }

/* ── Reader layout ── */
#reader {
  display:none;
  position:fixed; inset:0; z-index:100;
  background:var(--reader-bg);
}

/* Sidebar */
.sidebar {
  position:fixed; left:0; top:0; bottom:0;
  width:var(--sidebar-width);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(0); transition:transform 0.3s ease;
  z-index:10;
}

.sidebar.collapsed { transform:translateX(-100%); }

.sidebar-header {
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex; gap:12px; align-items:flex-start;
}

.sb-cover {
  width:40px; height:54px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),#7c3aed);
  border-radius:3px 6px 6px 3px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; overflow:hidden;
  box-shadow:-2px 3px 10px rgba(168,85,247,0.3), inset -1px 0 0 rgba(0,0,0,0.4);
}

.sb-cover img { width:100%; height:100%; object-fit:cover; border-radius:inherit; }

.sb-meta { flex:1; min-width:0; }
.sb-title { font-family:'DM Serif Display',serif; font-size:14px; color:#fff; line-height:1.3; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-author { font-size:11px; color:var(--ink-dim); }
.sb-progress { font-size:10px; color:var(--accent); margin-top:5px; }

.chapter-nav {
  flex:1; overflow-y:auto; padding:10px 8px;
}

.chapter-nav::-webkit-scrollbar { width:3px; }
.chapter-nav::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:2px; }

.ch-nav-item {
  padding:8px 10px; border-radius:6px; cursor:pointer;
  transition:background 0.15s; display:flex; align-items:center; gap:8px;
}

.ch-nav-item:hover { background:var(--lift); }
.ch-nav-item.active { background:rgba(192,132,252,0.12); }
.ch-nav-item.active .ch-nav-num { color:var(--accent); }

.ch-nav-num { font-size:10px; color:var(--ink-faint); width:20px; flex-shrink:0; text-align:right; font-variant-numeric:tabular-nums; }
.ch-nav-title { font-size:12px; color:var(--ink); line-height:1.4; flex:1; }
.ch-nav-item.active .ch-nav-title { color:#fff; }

/* Close reader */
.sidebar-footer {
  padding:12px; border-top:1px solid var(--border);
}

.btn-close-reader {
  width:100%; padding:9px;
  background:var(--lift); border:1px solid var(--border);
  border-radius:7px; color:var(--ink-dim);
  font-family:'DM Sans',sans-serif; font-size:12px;
  cursor:pointer; transition:all 0.15s;
}

.btn-close-reader:hover { color:var(--ink); border-color:var(--border-hi); }

/* Main reading area */
.reader-main {
  position:fixed;
  left:var(--sidebar-width); right:0; top:0; bottom:0;
  display:flex; flex-direction:column;
  transition:left 0.3s ease;
}

.reader-main.sidebar-collapsed { left:0; }

/* Top bar */
.reader-topbar {
  padding:0 24px;
  height:52px; flex-shrink:0;
  display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
  background:rgba(18,16,26,0.9);
  backdrop-filter:blur(8px);
}

.btn-toggle-sidebar {
  background:none; border:1px solid var(--border);
  border-radius:6px; padding:6px 10px;
  color:var(--ink-dim); cursor:pointer; font-size:14px;
  transition:all 0.15s;
}

.btn-toggle-sidebar:hover { color:var(--ink); border-color:var(--border-hi); }

.topbar-chapter {
  font-size:13px; color:var(--ink-dim);
  flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.font-controls {
  display:flex; align-items:center; gap:6px;
}

.btn-font {
  background:none; border:1px solid var(--border);
  border-radius:6px; padding:5px 10px;
  color:var(--ink-dim); cursor:pointer; font-size:13px;
  transition:all 0.15s;
}

.btn-font:hover { color:var(--ink); border-color:var(--border-hi); }

.chapter-nav-btns {
  display:flex; gap:6px;
}

.btn-nav-ch {
  background:none; border:1px solid var(--border);
  border-radius:6px; padding:5px 12px;
  color:var(--ink-dim); cursor:pointer; font-size:13px;
  transition:all 0.15s;
}

.btn-nav-ch:hover:not(:disabled) { color:var(--ink); border-color:var(--border-hi); }
.btn-nav-ch:disabled { opacity:0.3; cursor:not-allowed; }

/* Progress bar */
.reader-progress-bar {
  height:2px; background:var(--lift); flex-shrink:0;
}

.reader-progress-fill {
  height:100%;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  transition:width 0.3s;
}

/* Content area */
.reader-content {
  flex:1; overflow-y:auto; padding:48px 24px 80px;
  display:flex; justify-content:center;
}

.reader-content::-webkit-scrollbar { width:4px; }
.reader-content::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:2px; }

.chapter-body {
  width:100%; max-width:660px;
  font-family:'Lora', serif;
  font-size:var(--reader-font-size);
  line-height:var(--reader-line-height);
  color:var(--reader-ink);
}

.chapter-body h1, .chapter-body h2, .chapter-body h3,
.chapter-body h4, .chapter-body h5, .chapter-body h6 {
  font-family:'DM Serif Display', serif;
  color:#fff;
  margin:1.6em 0 0.6em;
  line-height:1.3;
}

.chapter-body h1 { font-size:1.6em; }
.chapter-body h2 { font-size:1.3em; }
.chapter-body h3 { font-size:1.1em; }

.chapter-body p {
  margin-bottom:0.9em;
  text-align:justify;
  text-align-last:left;
}

.chapter-body em, .chapter-body i { font-style:italic; }
.chapter-body strong, .chapter-body b { font-weight:600; color:#e8e0f0; }

.chapter-body a { color:var(--accent); text-decoration:none; }

.chapter-body blockquote {
  border-left:2px solid var(--accent);
  margin:1.2em 0; padding:0.6em 1.2em;
  color:var(--ink-dim); font-style:italic;
}

.chapter-body img {
  max-width:100%; border-radius:6px;
  margin:1em 0; display:block;
}

.chapter-body hr {
  border:none; border-top:1px solid var(--border);
  margin:2em auto; width:60%;
}

/* Chapter title header in reader */
.chapter-heading {
  margin-bottom:2em;
  padding-bottom:1.2em;
  border-bottom:1px solid var(--border);
}

.chapter-heading-num {
  font-size:11px; color:var(--ink-dim); letter-spacing:0.1em;
  text-transform:uppercase; margin-bottom:8px;
}

.chapter-heading-title {
  font-family:'DM Serif Display', serif;
  font-size:1.8em; color:#fff; line-height:1.25;
}

/* Bottom nav */
.reader-bottom-nav {
  position:fixed; bottom:90px; right:32px;
  display:flex; gap:10px; z-index:20;
}

.btn-scroll-top {
  background:var(--surface); border:1px solid var(--border-hi);
  border-radius:50%; width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink-dim); font-size:16px;
  transition:all 0.2s; opacity:0;
}

.btn-scroll-top.visible { opacity:1; }
.btn-scroll-top:hover { color:var(--ink); border-color:var(--accent); }

/* ── TTS Player bar ── */
#ttsBar {
  position:fixed; bottom:0; left:var(--sidebar-width); right:0;
  height:68px; z-index:50;
  background:rgba(18,16,26,0.97);
  border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex; align-items:center; gap:14px;
  padding:0 24px;
  transition:left 0.3s ease;
}
#ttsBar.sidebar-collapsed { left:0; }

/* Main bar row */
.tts-main-row {
  display:contents;
}

.tts-btn {
  background:none; border:1px solid var(--border);
  border-radius:50%; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink); font-size:16px;
  transition:all 0.18s; flex-shrink:0;
}
.tts-btn:hover { border-color:var(--accent); color:var(--accent); }
.tts-btn.play-active {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:transparent; color:#fff;
  box-shadow:0 0 16px rgba(168,85,247,0.4);
}
.tts-btn.loading { animation:tts-pulse 1s ease-in-out infinite; }
@keyframes tts-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.tts-info {
  flex:1; min-width:0;
  display:flex; flex-direction:column; gap:3px;
}
.tts-label { font-size:11px; color:var(--ink-dim); letter-spacing:0.04em; }
.tts-sentence {
  font-size:12px; color:var(--ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tts-key-hint { font-size:11px; color:var(--amber,#fcd34d); }

.tts-controls {
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.tts-speed { display:flex; align-items:center; gap:6px; }
.tts-speed-label { font-size:11px; color:var(--ink-dim); }
.tts-speed-val {
  font-size:12px; color:var(--accent); font-variant-numeric:tabular-nums;
  min-width:30px; text-align:center;
}
input[type=range].tts-slider {
  -webkit-appearance:none; appearance:none;
  width:80px; height:3px;
  background:var(--lift); border-radius:2px; outline:none; cursor:pointer;
}
input[type=range].tts-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:13px; height:13px; border-radius:50%;
  background:var(--accent); cursor:pointer;
  box-shadow:0 0 6px rgba(192,132,252,0.5);
}
/* custom voice dropdown */
.voice-dropdown {
  position:relative; max-width:180px; flex-shrink:0;
}
.voice-dropdown-btn {
  width:100%; background:#2a2535; border:1px solid var(--border);
  border-radius:6px; color:#e0d8f0; font-size:12px;
  padding:5px 26px 5px 8px; cursor:pointer; text-align:left;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  position:relative;
}
.voice-dropdown-btn::after {
  content:'▾'; position:absolute; right:8px; top:50%;
  transform:translateY(-50%); color:var(--ink-dim); pointer-events:none;
}
.voice-dropdown-btn:focus { outline:none; border-color:var(--accent); }

.voice-dropdown-list {
  display:none; position:absolute; bottom:calc(100% + 6px); left:0; right:0;
  background:#1e1a28; border:1px solid var(--border-hi);
  border-radius:8px; overflow:hidden; z-index:200;
  max-height:280px; overflow-y:auto;
  box-shadow:0 -8px 24px rgba(0,0,0,0.6);
}
.voice-dropdown-list::-webkit-scrollbar { width:3px; }
.voice-dropdown-list::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:2px; }
.voice-dropdown-list.open { display:block; }

.voice-dd-group {
  font-size:10px; color:var(--ink-dim); letter-spacing:0.08em;
  text-transform:uppercase; padding:8px 10px 4px;
  border-top:1px solid var(--border);
}
.voice-dd-group:first-child { border-top:none; }

.voice-dd-item {
  padding:7px 12px; font-size:12px; color:#d4cfe0;
  cursor:pointer; transition:background 0.12s;
}
.voice-dd-item:hover { background:rgba(192,132,252,0.12); color:#fff; }
.voice-dd-item.selected { color:var(--accent); background:rgba(192,132,252,0.08); }

/* Paragraph highlight while reading */
.tts-reading {
  background:rgba(192,132,252,0.1);
  border-radius:4px;
  outline:2px solid rgba(192,132,252,0.25);
  transition:background 0.2s;
}

.fade-in { animation:fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

@media(max-width:640px) {
  .sidebar { width:260px; }
  :root { --sidebar-width:260px; }
  .reader-content { padding:32px 16px 80px; }
  .reader-topbar { padding:0 12px; gap:8px; }
  .topbar-chapter { display:none; }
}
</style>
</head>
<body>

<!-- ── Landing page ── -->
<div id="landing">
  <div class="landing-header">
    <div class="logo-icon">📖</div>
    <div>
      <div class="logo-text">Épub<span>Lu</span></div>
      <div class="tagline">Lecteur ePub · confort de lecture · même bibliothèque</div>
    </div>
  </div>

  <div id="dropzone">
    <span class="dz-icon">📚</span>
    <div class="dz-title">Déposer un fichier ePub</div>
    <div class="dz-sub">ou cliquer pour parcourir</div>
    <input type="file" id="fileInput" accept=".epub">
  </div>

  <div id="library">
    <div class="library-title">Bibliothèque récente</div>
    <div class="book-grid" id="bookGrid"></div>
  </div>
</div>

<!-- ── Reader ── -->
<div id="reader">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sb-cover" id="sbCover">📖</div>
      <div class="sb-meta">
        <div class="sb-title" id="sbTitle">—</div>
        <div class="sb-author" id="sbAuthor"></div>
        <div class="sb-progress" id="sbProgress"></div>
      </div>
    </div>
    <div class="chapter-nav" id="chapterNav"></div>
    <div class="sidebar-footer">
      <button class="btn-close-reader" onclick="closeReader()">← Revenir à la bibliothèque</button>
    </div>
  </div>

  <div class="reader-main" id="readerMain">
    <div class="reader-topbar">
      <button class="btn-toggle-sidebar" id="btnToggleSidebar" onclick="toggleSidebar()" title="Masquer/afficher le sommaire">☰</button>
      <div class="topbar-chapter" id="topbarChapter"></div>
      <div class="font-controls">
        <button class="btn-font" onclick="changeFontSize(-1)" title="Réduire">A−</button>
        <button class="btn-font" onclick="changeFontSize(1)" title="Agrandir">A+</button>
      </div>
      <div class="chapter-nav-btns">
        <button class="btn-nav-ch" id="btnPrevCh" onclick="prevChapter()" title="Chapitre précédent">←</button>
        <button class="btn-nav-ch" id="btnNextCh" onclick="nextChapter()" title="Chapitre suivant">→</button>
      </div>
    </div>
    <div class="reader-progress-bar">
      <div class="reader-progress-fill" id="progressFill"></div>
    </div>
    <div class="reader-content" id="readerContent">
      <div class="chapter-body" id="chapterBody"></div>
    </div>
  </div>

  <div class="reader-bottom-nav">
    <button class="btn-scroll-top" id="btnScrollTop" onclick="scrollToTop()" title="Haut de page">↑</button>
  </div>

  <!-- TTS Player -->
  <div id="ttsBar">
    <div class="tts-main-row">
      <button class="tts-btn" id="btnTtsPlay" onclick="ttsToggle()" title="Lire / Pause (Espace)">▶</button>
      <button class="tts-btn" id="btnTtsStop" onclick="ttsStop()" title="Arrêter">■</button>
      <div class="tts-info">
        <div class="tts-label" id="ttsLabel">Lecture audio</div>
        <div class="tts-sentence" id="ttsSentence">Appuie sur ▶ pour écouter ce chapitre</div>
      </div>
      <div class="tts-controls">
        <div class="tts-speed">
          <span class="tts-speed-label">Vitesse</span>
          <input type="range" class="tts-slider" id="ttsSpeedSlider" min="0.6" max="1.8" step="0.1" value="1">
          <span class="tts-speed-val" id="ttsSpeedVal">1×</span>
        </div>
        <div class="voice-dropdown" id="voiceDropdown">
          <button class="voice-dropdown-btn" id="voiceDropdownBtn" onclick="toggleVoiceDropdown()">Chargement…</button>
          <div class="voice-dropdown-list" id="voiceDropdownList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', initApp);

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let currentBook = null;   // { title, author, coverUrl, chapters: [{title, html}] }
let currentChIdx = 0;
let sidebarOpen = true;
let fontSize = parseInt(localStorage.getItem('epublu_fontsize') || '17');
let recentBooks = JSON.parse(localStorage.getItem('epublu_recent') || '[]');

// ─────────────────────────────────────────────────────────────────────────────
// INIT APP
// ─────────────────────────────────────────────────────────────────────────────
function initApp() {
  applyFontSize();
  setupDrop();
  renderLibrary();
}

// ─────────────────────────────────────────────────────────────────────────────
// DROP ZONE
// ─────────────────────────────────────────────────────────────────────────────
function setupDrop() {
  const dz = document.getElementById('dropzone');
  const fi = document.getElementById('fileInput');
  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.epub')) loadEpubFile(f);
  });
  fi.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) loadEpubFile(f);
    fi.value = '';
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// EPUB LOADING & PARSING (réutilisé depuis epub-to-audiobook.html)
// ─────────────────────────────────────────────────────────────────────────────
async function loadEpubFile(file) {
  try {
    const zip = await JSZip.loadAsync(file);
    const book = await parseEpub(zip);
    openBook(book);
  } catch(e) {
    console.error(e);
    alert(`Erreur de lecture : ${e.message}`);
  }
}

async function parseEpub(zip) {
  const cxml = await zip.file('META-INF/container.xml').async('string');
  const cdoc = new DOMParser().parseFromString(cxml, 'application/xml');
  const opfPath = cdoc.querySelector('rootfile').getAttribute('full-path');
  const opfDir  = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
  const oxml    = await zip.file(opfPath).async('string');
  const odoc    = new DOMParser().parseFromString(oxml, 'application/xml');

  const title  = odoc.querySelector('metadata > *[*|name="title"],  dc\\:title,  title')?.textContent?.trim()  || 'Sans titre';
  const author = odoc.querySelector('metadata > *[*|name="creator"], dc\\:creator, creator')?.textContent?.trim() || 'Auteur inconnu';

  // Cover image
  let coverUrl = null;
  try {
    let coverItem = odoc.querySelector('manifest item[properties~="cover-image"]');
    if (!coverItem) {
      const metaCover = odoc.querySelector('metadata > meta[name="cover"]');
      const coverItemId = metaCover?.getAttribute('content');
      if (coverItemId) coverItem = odoc.querySelector(`manifest item[id="${coverItemId}"]`);
    }
    if (!coverItem) coverItem = odoc.querySelector('manifest item[id="cover-image"], manifest item[id="cover"], manifest item[id="coverImage"], manifest item[id="cover_image"]');
    if (!coverItem) {
      const items = [...odoc.querySelectorAll('manifest item')];
      coverItem = items.find(it => {
        const id = (it.getAttribute('id') || '').toLowerCase();
        const href = (it.getAttribute('href') || '').toLowerCase();
        const mt = (it.getAttribute('media-type') || '').toLowerCase();
        return mt.startsWith('image/') && (id.includes('cover') || href.includes('cover'));
      });
    }
    if (coverItem) {
      const href = coverItem.getAttribute('href');
      const mediaType = coverItem.getAttribute('media-type') || 'image/jpeg';
      const imgFile = zip.file(opfDir + href) || zip.file(href);
      if (imgFile) {
        const bytes = await imgFile.async('uint8array');
        coverUrl = URL.createObjectURL(new Blob([bytes], { type: mediaType }));
      }
    }
  } catch(e) { console.warn('[Cover] extraction failed:', e); }

  const spineIds = [...odoc.querySelectorAll('spine itemref')].map(i => i.getAttribute('idref'));
  const manifest = {};
  odoc.querySelectorAll('manifest item').forEach(it => { manifest[it.getAttribute('id')] = it.getAttribute('href'); });

  // Image resolver : pour afficher les images intégrées dans les chapitres
  const imageCache = {};
  async function resolveImages(doc, baseDir) {
    const imgs = [...doc.querySelectorAll('img, image')];
    for (const img of imgs) {
      const srcAttr = img.getAttribute('src') || img.getAttribute('xlink:href') || img.getAttribute('href');
      if (!srcAttr || srcAttr.startsWith('data:') || srcAttr.startsWith('blob:')) continue;
      const key = baseDir + srcAttr;
      if (!imageCache[key]) {
        try {
          const chDir = baseDir.includes('/') ? baseDir : '';
          const imgPath = srcAttr.startsWith('/') ? srcAttr.slice(1) : (chDir + srcAttr);
          const imgFile = zip.file(imgPath);
          if (imgFile) {
            const bytes = await imgFile.async('uint8array');
            const mime = srcAttr.match(/\.(png)$/i) ? 'image/png' : srcAttr.match(/\.(gif)$/i) ? 'image/gif' : srcAttr.match(/\.(webp)$/i) ? 'image/webp' : 'image/jpeg';
            imageCache[key] = URL.createObjectURL(new Blob([bytes], { type: mime }));
          }
        } catch(e) { /* skip */ }
      }
      if (imageCache[key]) img.setAttribute('src', imageCache[key]);
    }
  }

  const tocByHref = await parseTocMap(zip, odoc, opfDir, manifest);

  const tocHrefs = new Set();
  tocByHref.forEach((_, h) => tocHrefs.add(h));
  let firstTocSpineIdx = -1;
  for (let i = 0; i < spineIds.length; i++) {
    const h = manifest[spineIds[i]];
    if (h && (tocHrefs.has(h) || tocHrefs.has(h.split('#')[0]))) { firstTocSpineIdx = i; break; }
  }

  const PART_PATTERN = /\b(première|deuxième|troisième|quatrième|cinquième|sixième|septième|huitième|neuvième|dixième|premiere|seconde|premier|second|deuxieme|troisieme|quatrieme|cinquieme)\s+(partie|tome|livre|book|part)\b|\b(partie|tome|livre|book|part)\s+[IVXLC0-9]+\b/i;

  const chapters = [];
  for (let i = 0; i < spineIds.length; i++) {
    const id = spineIds[i];
    const href = manifest[id]; if (!href) continue;
    const fobj = zip.file(opfDir + href) || zip.file(href); if (!fobj) continue;
    const html  = await fobj.async('string');
    const doc   = new DOMParser().parseFromString(html, 'text/html');

    const chTitle = (() => {
      const tocTitle = tocByHref.get(href) || tocByHref.get(href.split('#')[0]);
      if (tocTitle && PART_PATTERN.test(tocTitle)) return tocTitle;
      return extractChapterTitle(doc, chapters.length + 1);
    })();

    const tocTitle = tocByHref.get(href) || tocByHref.get(href.split('#')[0]);
    const inToc = !!tocTitle;
    const isFrontmatter = firstTocSpineIdx === -1 || i < firstTocSpineIdx;
    const text = extractText(doc.body).trim();

    let keep = false;
    if (isFrontmatter) { if (text.length > 80) keep = true; }
    else if (inToc) keep = true;

    if (!keep) continue;

    // Sanitize & resolve images dans le HTML du chapitre
    const chDir = href.includes('/') ? opfDir + href.substring(0, href.lastIndexOf('/') + 1) : opfDir;
    await resolveImages(doc, chDir);

    // Nettoie les balises indésirables mais conserve le balisage de mise en forme
    const body = doc.body || doc;
    ['script', 'style', 'nav', 'link', 'meta', 'head'].forEach(tag => {
      body.querySelectorAll(tag).forEach(el => el.remove());
    });

    chapters.push({ title: chTitle, html: body.innerHTML });
  }

  return { title, author, coverUrl, chapters };
}

async function parseTocMap(zip, odoc, opfDir, manifest) {
  const result = new Map();
  try {
    const navItem = [...odoc.querySelectorAll('manifest item')].find(it =>
      (it.getAttribute('properties') || '').split(/\s+/).includes('nav'));
    if (navItem) {
      const navHref = navItem.getAttribute('href');
      const navFile = zip.file(opfDir + navHref) || zip.file(navHref);
      if (navFile) {
        const navHtml = await navFile.async('string');
        const navDoc = new DOMParser().parseFromString(navHtml, 'text/html');
        const navEl = navDoc.querySelector('nav[*|type="toc"], nav') || navDoc.body;
        const navDir = navHref.includes('/') ? navHref.substring(0, navHref.lastIndexOf('/') + 1) : '';
        navEl.querySelectorAll('a[href], span').forEach(el => {
          const text = el.textContent.replace(/\s+/g, ' ').trim();
          if (!text) return;
          const href = el.getAttribute('href');
          if (href) {
            const resolved = (navDir + href.split('#')[0]).replace(/^\.\//, '');
            if (!result.has(resolved)) result.set(resolved, text);
          }
        });
      }
    }
    if (result.size === 0) {
      const spineEl = odoc.querySelector('spine');
      const ncxId = spineEl?.getAttribute('toc');
      if (ncxId && manifest[ncxId]) {
        const ncxFile = zip.file(opfDir + manifest[ncxId]) || zip.file(manifest[ncxId]);
        if (ncxFile) {
          const ncxXml = await ncxFile.async('string');
          const ncxDoc = new DOMParser().parseFromString(ncxXml, 'application/xml');
          const ncxDir = manifest[ncxId].includes('/') ? manifest[ncxId].substring(0, manifest[ncxId].lastIndexOf('/') + 1) : '';
          ncxDoc.querySelectorAll('navPoint').forEach(np => {
            const text = np.querySelector('navLabel text')?.textContent?.replace(/\s+/g, ' ').trim();
            const src = np.querySelector('content')?.getAttribute('src');
            if (text && src) {
              const resolved = (ncxDir + src.split('#')[0]).replace(/^\.\//, '');
              if (!result.has(resolved)) result.set(resolved, text);
            }
          });
        }
      }
    }
  } catch(e) { console.warn('TOC parsing failed:', e); }
  return result;
}

function extractChapterTitle(doc, fallbackNum) {
  const fromHeadings = [...doc.querySelectorAll('h1, h2, h3, h4, h5, h6')]
    .slice(0, 4)
    .map(h => h.textContent.replace(/\s+/g, ' ').trim());
  const fromBody = [];
  const blocks = [...(doc.body || doc).querySelectorAll('p, div, span, header')].slice(0, 30);
  for (const el of blocks) {
    if (el.querySelector('p, div')) continue;
    const t = el.textContent.replace(/\s+/g, ' ').trim();
    if (t.length === 0) continue;
    if (t.length > 120) break;
    const looksLikeTitle =
      /^[A-ZÉÈÊÀÂÔÛÎÇŸÆŒ0-9\s''.\-:!?—,]+$/.test(t) ||
      /^\s*(chapitre|chapter|prologue|épilogue|epilogue|avant[- ]propos|préface|preface|partie|livre|book|part)/i.test(t) ||
      /^\s*[IVXLCDM]+\s*$/i.test(t) ||
      /^\s*\d+\s*$/.test(t);
    if (looksLikeTitle) fromBody.push(t);
    if (fromBody.length >= 4) break;
  }
  const all = [...fromHeadings, ...fromBody]
    .map(t => t.replace(/\s+/g, ' ').trim())
    .filter(t => t.length > 0 && t.length < 200);
  const unique = [];
  for (const t of all) {
    const dupIdx = unique.findIndex(u => u === t || u.includes(t) || t.includes(u));
    if (dupIdx === -1) unique.push(t);
    else if (t.length > unique[dupIdx].length) unique[dupIdx] = t;
  }
  if (unique.length === 0) return `Chapitre ${fallbackNum}`;
  return unique.slice(0, 3).join(' — ');
}

function extractText(node) {
  if (!node) return '';
  let t = '';
  for (const c of node.childNodes) {
    if (c.nodeType === Node.TEXT_NODE) { t += c.textContent; }
    else if (c.nodeType === Node.ELEMENT_NODE) {
      const tag = c.tagName.toLowerCase();
      if (['script','style','nav','aside','figure'].includes(tag)) continue;
      const inner = extractText(c);
      if (['p','h1','h2','h3','h4','li','div','br','tr'].includes(tag)) t += inner.trim() + '\n\n';
      else t += inner;
    }
  }
  return t;
}

function renderLibrary() {
  const lib = document.getElementById('library');
  const grid = document.getElementById('bookGrid');
  if (recentBooks.length === 0) { lib.style.display = 'none'; return; }
  lib.style.display = 'block';
  grid.innerHTML = '';
  recentBooks.slice(0, 12).forEach((b, idx) => {
    const card = document.createElement('div');
    card.className = 'book-thumb fade-in';
    card.innerHTML = `
      <div class="book-thumb-cover">${b.coverUrl ? `<img src="${b.coverUrl}">` : '📚'}</div>
      <div class="book-thumb-info">
        <div class="book-thumb-title">${b.title}</div>
        <div class="book-thumb-author">${b.author}</div>
      </div>`;
    card.title = `Recharger "${b.title}" (glisser à nouveau le fichier)`;
    grid.appendChild(card);
  });
}

function saveToRecent(book) {
  const entry = { title: book.title, author: book.author, coverUrl: book.coverUrl, date: Date.now() };
  recentBooks = recentBooks.filter(b => b.title !== book.title);
  recentBooks.unshift(entry);
  if (recentBooks.length > 12) recentBooks = recentBooks.slice(0, 12);
  try { localStorage.setItem('epublu_recent', JSON.stringify(recentBooks)); } catch(_) {}
}

// READER
// ─────────────────────────────────────────────────────────────────────────────
function openBook(book) {
  currentBook = book;
  currentChIdx = 0;
  saveToRecent(book);
  renderLibrary();

  // Sidebar metadata
  const sbCover = document.getElementById('sbCover');
  if (book.coverUrl) {
    sbCover.innerHTML = `<img src="${book.coverUrl}">`;
  } else {
    sbCover.textContent = '📖';
  }
  document.getElementById('sbTitle').textContent = book.title;
  document.getElementById('sbAuthor').textContent = book.author;

  // Chapter nav
  buildChapterNav();
  renderChapter(0);

  document.getElementById('landing').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('reader').classList.add('fade-in');
}

function closeReader() {
  document.getElementById('reader').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  currentBook = null;
}

function buildChapterNav() {
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = '';
  currentBook.chapters.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'ch-nav-item' + (i === 0 ? ' active' : '');
    el.dataset.idx = i;
    el.innerHTML = `<span class="ch-nav-num">${i+1}</span><span class="ch-nav-title">${ch.title}</span>`;
    el.addEventListener('click', () => renderChapter(i));
    nav.appendChild(el);
  });
}

function renderChapter(idx) {
  if (!currentBook || idx < 0 || idx >= currentBook.chapters.length) return;
  // Arrête la lecture TTS si on change de chapitre manuellement (pas automatiquement)
  if (typeof ttsPlaying !== 'undefined' && (ttsPlaying || ttsPaused || ttsLoading)) ttsStop();
  currentChIdx = idx;

  const ch = currentBook.chapters[idx];
  const body = document.getElementById('chapterBody');

  // Render formatted HTML
  body.innerHTML = `
    <div class="chapter-heading">
      <div class="chapter-heading-num">Chapitre ${idx + 1} / ${currentBook.chapters.length}</div>
      <div class="chapter-heading-title">${ch.title}</div>
    </div>
    ${ch.html}
  `;

  // Scroll to top
  document.getElementById('readerContent').scrollTo({ top: 0 });

  // Update nav active state
  document.querySelectorAll('.ch-nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  // Scroll sidebar to active item
  const activeItem = document.querySelector(`.ch-nav-item[data-idx="${idx}"]`);
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Topbar chapter title
  document.getElementById('topbarChapter').textContent = ch.title;

  // Nav buttons
  document.getElementById('btnPrevCh').disabled = idx === 0;
  document.getElementById('btnNextCh').disabled = idx === currentBook.chapters.length - 1;

  // Progress
  updateProgress();
}

function prevChapter() { renderChapter(currentChIdx - 1); }
function nextChapter() { renderChapter(currentChIdx + 1); }

function updateProgress() {
  const pct = currentBook.chapters.length > 1
    ? Math.round((currentChIdx / (currentBook.chapters.length - 1)) * 100)
    : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('sbProgress').textContent = `Ch. ${currentChIdx + 1}/${currentBook.chapters.length} · ${pct}%`;
}

// TTS — Web Speech API (gratuit, voix du navigateur)
// ─────────────────────────────────────────────────────────────────────────────
let ttsPlaying  = false;
let ttsPaused   = false;
let ttsSegments = [];
let ttsSegIdx   = 0;
let ttsSpeed    = parseFloat(localStorage.getItem('epublu_tts_speed') || '1');

// ── Kokoro local server ──
const KOKORO_URL = 'http://127.0.0.1:5007';
let kokoroAvailable = false;

async function probeKokoro() {
  try {
    const r = await fetch(KOKORO_URL + '/health', { signal: AbortSignal.timeout(1200) });
    if (r.ok) { const d = await r.json(); kokoroAvailable = d.status === 'ok'; }
  } catch(_) { kokoroAvailable = false; }
  ttsLoadVoices();
}
probeKokoro();

// ── Dropdown voix custom ──
const MS_PRIORITY = ['Microsoft Denise', 'Microsoft Henri'];
let selectedVoiceName = localStorage.getItem('epublu_tts_voice') || '';

function toggleVoiceDropdown() {
  document.getElementById('voiceDropdownList').classList.toggle('open');
}

// Ferme si clic en dehors
document.addEventListener('click', e => {
  if (!document.getElementById('voiceDropdown').contains(e.target))
    document.getElementById('voiceDropdownList').classList.remove('open');
});

function selectVoice(name, label) {
  selectedVoiceName = name;
  localStorage.setItem('epublu_tts_voice', name);
  document.getElementById('voiceDropdownBtn').textContent = label;
  document.getElementById('voiceDropdownList').classList.remove('open');
  document.querySelectorAll('.voice-dd-item').forEach(el =>
    el.classList.toggle('selected', el.dataset.voice === name));
  if (ttsPlaying) ttsStop();
}

function ttsGetVoice() {
  return speechSynthesis.getVoices().find(v => v.name === selectedVoiceName) || null;
}

function ttsLoadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  const fr     = voices.filter(v => v.lang.startsWith('fr'));
  const others = voices.filter(v => !v.lang.startsWith('fr'));
  const top    = fr.filter(v => MS_PRIORITY.some(p => v.name.startsWith(p)));
  const rest   = fr.filter(v => !MS_PRIORITY.some(p => v.name.startsWith(p)));

  const list = document.getElementById('voiceDropdownList');
  list.innerHTML = '';

  function addGroup(title, items, labelFn) {
    if (!items.length) return;
    const grp = document.createElement('div');
    grp.className = 'voice-dd-group';
    grp.textContent = title;
    list.appendChild(grp);
    items.forEach(v => {
      const item = document.createElement('div');
      item.className = 'voice-dd-item';
      item.dataset.voice = v.name;
      item.textContent = labelFn(v);
      item.onclick = () => selectVoice(v.name, item.textContent);
      list.appendChild(item);
    });
  }

  // Voix Kokoro locale en tête si serveur disponible
  if (kokoroAvailable) {
    const grp = document.createElement('div');
    grp.className = 'voice-dd-group';
    grp.textContent = '🐉 Kokoro local';
    list.appendChild(grp);
    const item = document.createElement('div');
    item.className = 'voice-dd-item';
    item.dataset.voice = 'fm_drow';
    item.textContent = 'fm_drow ♂ · Drow (local)';
    item.onclick = () => selectVoice('fm_drow', item.textContent);
    list.appendChild(item);
  }

  addGroup('⭐ Recommandées', top, v =>
    v.name.includes('Denise') ? 'Denise ♀ · Neural FR' : 'Henri ♂ · Neural FR');
  addGroup('Français', rest, v => v.name + (v.localService ? '' : ' 🌐'));
  addGroup('Autres langues', others, v => `${v.name} (${v.lang})`);

  // Sélection initiale
  const saved = localStorage.getItem('epublu_tts_voice');
  const defaultVoice = saved && voices.find(v => v.name === saved)
    ? voices.find(v => v.name === saved)
    : (top[0] || fr[0] || voices[0]);

  if (defaultVoice) {
    const item = list.querySelector(`[data-voice="${CSS.escape(defaultVoice.name)}"]`);
    const label = item ? item.textContent : defaultVoice.name;
    selectedVoiceName = defaultVoice.name;
    document.getElementById('voiceDropdownBtn').textContent = label;
    item?.classList.add('selected');
  }
}

speechSynthesis.addEventListener('voiceschanged', ttsLoadVoices);
ttsLoadVoices();

// ── Extrait les paragraphes du chapitre ──
function ttsExtractSegments() {
  const body = document.getElementById('chapterBody');
  return [...body.querySelectorAll('p, h1, h2, h3, h4, li, blockquote')]
    .map(el => ({ el, text: el.textContent.replace(/\s+/g, ' ').trim() }))
    .filter(s => s.text.length > 3);
}

// ── Play / Pause / Stop ──
function ttsToggle() {
  if (!currentBook) return;
  if (ttsPaused) {
    speechSynthesis.resume();
    ttsPaused  = false;
    ttsPlaying = true;
    ttsUpdateBtn();
    return;
  }
  if (ttsPlaying) {
    speechSynthesis.pause();
    ttsPaused  = true;
    ttsPlaying = false;
    ttsUpdateBtn();
    return;
  }
  ttsSegments = ttsExtractSegments();
  ttsSegIdx   = 0;
  ttsPlaying  = true;
  ttsPaused   = false;
  ttsUpdateBtn();
  ttsPlaySegment(0);
}

function ttsStop() {
  speechSynthesis.cancel();
  ttsStopKokoro();
  ttsPlaying = false;
  ttsPaused  = false;
  ttsSegIdx  = 0;
  ttsRemoveHighlight();
  document.getElementById('ttsSentence').textContent = 'Appuie sur ▶ pour écouter ce chapitre';
  document.getElementById('ttsLabel').textContent = 'Lecture audio · Voix du navigateur';
  ttsUpdateBtn();
}

// ── AudioContext pour Kokoro local ──
let _audioCtx = null;
let _audioSrc = null;

function ttsStopKokoro() {
  if (_audioSrc) { try { _audioSrc.stop(); } catch(_) {} _audioSrc = null; }
}

async function ttsPlayKokoroSegment(text, speed) {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const resp = await fetch(KOKORO_URL + '/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, speed }),
  });
  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error || `HTTP ${resp.status}`);
  }
  const decoded = await _audioCtx.decodeAudioData(await resp.arrayBuffer());
  return new Promise(resolve => {
    const src = _audioCtx.createBufferSource();
    src.buffer = decoded;
    src.connect(_audioCtx.destination);
    _audioSrc = src;
    src.onended = resolve;
    src.start(0);
  });
}

function ttsPlaySegment(idx) {
  if (!ttsPlaying) return;
  if (idx >= ttsSegments.length) {
    ttsRemoveHighlight();
    if (currentChIdx < currentBook.chapters.length - 1) {
      ttsPlaying = false;
      renderChapter(currentChIdx + 1);
      ttsPlaying = true;
      setTimeout(() => {
        ttsSegments = ttsExtractSegments();
        ttsSegIdx   = 0;
        ttsPlaySegment(0);
      }, 300);
    } else {
      ttsStop();
    }
    return;
  }

  const seg = ttsSegments[idx];
  ttsSegIdx = idx;

  ttsRemoveHighlight();
  seg.el.classList.add('tts-reading');
  seg.el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  document.getElementById('ttsSentence').textContent = seg.text;
  document.getElementById('ttsLabel').textContent =
    `Segment ${idx + 1}/${ttsSegments.length} · Ch. ${currentChIdx + 1}`;

  if (selectedVoiceName === 'fm_drow') {
    // ── Kokoro local ──
    ttsPlayKokoroSegment(seg.text, ttsSpeed)
      .then(() => { if (ttsPlaying) ttsPlaySegment(idx + 1); })
      .catch(e => {
        console.error('[Kokoro]', e);
        document.getElementById('ttsSentence').textContent = `⚠ Kokoro : ${e.message}`;
        ttsPlaying = false; ttsUpdateBtn();
      });
  } else {
    // ── Web Speech API ──
    const utter  = new SpeechSynthesisUtterance(seg.text);
    utter.rate   = ttsSpeed;
    utter.lang   = 'fr-FR';
    const voice  = ttsGetVoice();
    if (voice) utter.voice = voice;
    utter.onend   = () => { if (ttsPlaying) ttsPlaySegment(idx + 1); };
    utter.onerror = e  => {
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      ttsPlaySegment(idx + 1);
    };
    speechSynthesis.speak(utter);
  }
}

function ttsRemoveHighlight() {
  document.querySelectorAll('.tts-reading').forEach(el => el.classList.remove('tts-reading'));
}

function ttsUpdateBtn() {
  const btn = document.getElementById('btnTtsPlay');
  if (ttsPlaying) {
    btn.textContent = '⏸'; btn.classList.add('play-active');
  } else if (ttsPaused) {
    btn.textContent = '▶'; btn.classList.add('play-active');
  } else {
    btn.textContent = '▶'; btn.classList.remove('play-active');
  }
}


// ─────────────────────────────────────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ─────────────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!currentBook) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown') nextChapter();
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   prevChapter();
  if (e.key === ' ') { e.preventDefault(); ttsToggle(); }
  if (e.key === 'Escape') toggleSidebar();
});
</script>
